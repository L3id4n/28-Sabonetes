<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <title>Resultado</title>
</head>
<body>

    <div>
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
    </div>
        
        <div class="container">

        <h1>Resultado da Análise</h1>

        <h2>Ranking de Culturas</h2>

        <ol>
            {% for planta, pontos in ranking %}
                <li>{{ planta }} - {{ pontos }}%</li>
            {% endfor %}
        </ol>

        <div class="resultado">
            <h2>Melhor opção</h2>

            {% for planta in melhores_plantas %}
                <p>{{ planta }}</p>
            {% endfor %}

            <p>Compatibilidade: {{ maior_pontuacao }}%</p>
        </div>

        <a href="/">Nova análise</a>

    </div>

</body>
</html>
